name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Qt and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qtbase5-dev \
            qtbase5-dev-tools \
            qt5-qmake \
            libqt5sql5-sqlite \
            libqt5test5t64

      - name: Build main application
        run: |
          cd ${{ github.workspace }}/address-book-qt
          qmake addressbook.pro
          make -j$(nproc)

      - name: Build and run tests
        run: |
          cd ${{ github.workspace }}/address-book-qt/tests
          qmake tests.pro
          make -j$(nproc)
          ./build/tst_addressbook
